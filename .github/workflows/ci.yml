name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # Default-features build, integration + unit + doc tests, and clippy.
  test:
    name: test (default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libasound2-dev pkg-config

      - name: Build
        run: cargo build --all-targets --locked

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --all-targets --locked

      - name: Doc tests
        run: cargo test --doc --locked

  # Verify the optional `onnx` feature still type-checks and lints clean.
  # We don't run the ONNX test path because the bundled models aren't
  # available in CI; `check + clippy` catches regressions in the surface
  # without requiring model artifacts.
  onnx-check:
    name: check (onnx feature)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: onnx

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libasound2-dev pkg-config

      - name: Check (onnx)
        run: cargo check --features onnx --all-targets --locked

      - name: Clippy (onnx)
        run: cargo clippy --features onnx --all-targets --locked -- -D warnings
