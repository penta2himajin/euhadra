name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # Default-features build, integration + unit + doc tests, and clippy.
  test:
    name: test (default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libasound2-dev pkg-config

      - name: Build
        run: cargo build --all-targets --locked

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --all-targets --locked

      - name: Doc tests
        run: cargo test --doc --locked

  # Verify the optional `onnx` feature still type-checks and lints clean.
  # We don't run the ONNX test path because the bundled models aren't
  # available in CI; `check + clippy` catches regressions in the surface
  # without requiring model artifacts.
  onnx-check:
    name: check (onnx feature)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: onnx

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libasound2-dev pkg-config

      - name: Check (onnx)
        run: cargo check --features onnx --all-targets --locked

      - name: Clippy (onnx)
        run: cargo clippy --features onnx --all-targets --locked -- -D warnings

  # L1 ASR live smoke (§1.1 / §3.8): runs Canary-180M-Flash (en + es),
  # Parakeet (ja), Paraformer-large (zh), Whisper-large-v3-turbo ONNX
  # (ko), and whisper-tiny (fallback) on a 10-utterance FLEURS subset
  # per language, measures WER/CER + ASR/E2E latency + RTF, and gates
  # against docs/benchmarks/ci_baseline.json. All large artefacts
  # (whisper.cpp build, GGML models, FLEURS subset, parakeet-ja
  # ONNX bundle, paraformer-zh ONNX bundle, canary en + es ONNX
  # bundles, whisper-onnx-turbo ONNX bundle) are cached so warm
  # runs finish in a couple of minutes.
  # Parakeet-ja replaced whisper-tiny for `ja` in PR #11 (CER 42% → 3.3%).
  # Parakeet-v3 replaced whisper-tiny.en for `en` in PR #12 (WER 8.4% → 7.5%),
  # then Canary-180M-Flash INT8 replaced Parakeet-v3 for `en` in
  # PR #61 / issue #57 (WER 7.5% → 4.4%, ~2.4 GB → ~213 MB).
  # Paraformer-large replaced whisper-tiny for `zh` in PR #14
  # (CER 37% → ~5%; baseline numbers recalibrated in a follow-up commit).
  # SenseVoice-Small added `ko` in PR #45, then Whisper-large-v3-turbo
  # ONNX (q4) replaced SenseVoice for `ko` in PR #106 / issue #83
  # (CER 6.64% → 0.95%, no Python deps, same `onnx` feature gate).
  evaluate-asr:
    name: evaluate (ASR live smoke)
    runs-on: ubuntu-latest
    # Warm-cache runs finish in ~4 min. The cold Whisper-ONNX-Turbo
    # download is curl-only (~900 MB), much faster than the legacy
    # SenseVoice self-export. 45 min still gives enough headroom for
    # a fully cold run (whisper.cpp + GGML + ONNX bundles); subsequent runs hit cache and exit
    # well under the original 30 min budget.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # CI runner CPU identification — surfaces whether INT8 acceleration
      # primitives (AVX-VNNI / AVX-512 VNNI / AMX) are available on this
      # runner. ONNX Runtime's INT8 MatMul kernels fall back to a
      # dequantize-then-FP32 path on CPUs that lack VNNI, which can make
      # INT8 weights slower than FP32 even though the bundle is smaller.
      # We dump both the model name and the INT8-relevant flag subset so
      # the Canary INT8 latency numbers can be interpreted against the
      # hardware they were measured on (issue #58 PR #64 follow-up).
      - name: Dump CPU info (INT8 acceleration check)
        run: |
          echo "## CPU model"
          grep -m1 '^model name' /proc/cpuinfo || true
          echo
          echo "## INT8-relevant flags (presence => hardware-accelerated INT8)"
          grep -m1 '^flags' /proc/cpuinfo \
            | tr ' ' '\n' \
            | grep -iE '^(avx_vnni|avx512_vnni|avx512bw|avx512vbmi2|amx_int8|amx_bf16|amx_tile|fma|sse4_2)$' \
            | sort -u \
            || echo '(none present)'
          echo
          echo "## Full CPU flags (first CPU)"
          grep -m1 '^flags' /proc/cpuinfo

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: eval

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev pkg-config build-essential cmake python3-pip

      - name: Install Python deps for FLEURS download
        run: pip3 install --quiet 'datasets==2.21.0' soundfile librosa

      - name: Cache whisper.cpp build + tiny models
        id: whisper-cache
        uses: actions/cache@v4
        with:
          path: vendor/whisper.cpp
          key: whisper-cpp-v1.7.4-tiny-${{ runner.os }}

      - name: Build whisper.cpp + download tiny models
        run: bash scripts/setup_whisper.sh

      - name: Cache FLEURS subset
        id: fleurs-cache
        uses: actions/cache@v4
        with:
          path: data/fleurs_subset
          key: fleurs-subset-v3-en-ja-zh-es-ko-n10

      - name: Download FLEURS subset (cache miss only)
        if: steps.fleurs-cache.outputs.cache-hit != 'true'
        run: python3 scripts/download_fleurs_subset.py --lang en --lang ja --lang zh --lang es --lang ko --n 10

      - name: Cache parakeet-ja ONNX bundle (~2.4 GB)
        id: parakeet-ja-cache
        uses: actions/cache@v4
        with:
          path: vendor/parakeet_ja
          key: parakeet-tdt-ctc-0.6b-ja-sunilmahendrakar-v1

      - name: Download parakeet-ja model (cache miss only)
        if: steps.parakeet-ja-cache.outputs.cache-hit != 'true'
        run: bash scripts/setup_parakeet_ja.sh
        env:
          PARAKEET_JA_DIR: vendor/parakeet_ja

      - name: Cache paraformer-zh ONNX bundle (~240 MB)
        id: paraformer-zh-cache
        uses: actions/cache@v4
        with:
          path: vendor/paraformer_zh
          key: paraformer-large-zh-funasr-quant-v1

      - name: Download paraformer-zh model (cache miss only)
        if: steps.paraformer-zh-cache.outputs.cache-hit != 'true'
        run: bash scripts/setup_paraformer_zh.sh
        env:
          PARAFORMER_ZH_DIR: vendor/paraformer_zh

      - name: Cache canary-es ONNX bundle (~213 MB INT8)
        id: canary-es-cache
        uses: actions/cache@v4
        with:
          path: vendor/canary_es
          key: canary-180m-flash-istupakov-es-int8-v1

      - name: Download canary-es model (cache miss only)
        if: steps.canary-es-cache.outputs.cache-hit != 'true'
        run: bash scripts/setup_canary.sh
        env:
          CANARY_DIR: vendor/canary_es

      # canary-en uses the SAME `canary-180m-flash` multilingual
      # checkpoint as canary-es — both now run on the INT8 weights
      # (issue #58 flipped es from FP32 → INT8, matching en's Phase 2
      # swap in issue #57). The bundles still live in separate vendor
      # dirs / cache slots because the adapter is configured per
      # language (e.g. language tag, prompt format) and we don't want
      # one language's hypothesis-time mutation to clobber the other's
      # cache entry. The cache keys are kept distinct (`-es-int8-v1`
      # vs `-int8-v1`) so the two slots can be evicted independently.
      - name: Cache canary-en ONNX bundle (~213 MB INT8)
        id: canary-en-cache
        uses: actions/cache@v4
        with:
          path: vendor/canary_en
          key: canary-180m-flash-istupakov-int8-v1

      - name: Download canary-en model (cache miss only)
        if: steps.canary-en-cache.outputs.cache-hit != 'true'
        run: bash scripts/setup_canary.sh
        env:
          CANARY_DIR: vendor/canary_en

      # Whisper-large-v3-turbo ONNX bundle for ko (~900 MB total:
      # tokenizer.json + 3 quantised ONNX files at `q4`). Direct
      # download from the `onnx-community/whisper-large-v3-turbo`
      # HuggingFace mirror — no re-export, no Python deps. Replaces
      # the SenseVoice-Small slot we used to ship; the #83 bench
      # measured CER 1.09% vs SenseVoice's 6.64% on FLEURS-ko.
      - name: Cache whisper-onnx-turbo ko bundle (~900 MB, q4)
        id: whisper-onnx-cache
        uses: actions/cache@v4
        with:
          path: vendor/whisper_onnx_turbo
          key: whisper-large-v3-turbo-onnx-q4-v1

      - name: Download whisper-onnx-turbo (cache miss only)
        if: steps.whisper-onnx-cache.outputs.cache-hit != 'true'
        run: bash scripts/setup_whisper_onnx_turbo.sh
        env:
          WHISPER_ONNX_DIR: vendor/whisper_onnx_turbo

      - name: Build eval binary (with onnx for Parakeet/Paraformer/Canary/WhisperOnnx adapters)
        run: cargo build --release --example eval_l1_smoke --features onnx --locked

      - name: Prepare ORT profile output dir
        run: mkdir -p "${{ github.workspace }}/canary-profile"

      - name: Run L1 smoke evaluation
        env:
          # Force INT8 for both `en` and `es` canary slots. `en` already
          # defaults to INT8 in `load_canary_adapter` (issue #57), so this
          # is a no-op for `en` and the actual flip for `es` (issue #58).
          # Setting it at job scope keeps the two slots symmetric and
          # makes the variant explicit in the CI log.
          CANARY_INT8: "1"
          # ORT per-op profile JSONs for both Canary sessions (en + es,
          # encoder + decoder = 4 traces total, named
          # `canary-{encoder,decoder}_<timestamp>.json`). Uploaded as
          # an artifact by the next step. Used to diagnose whether the
          # ORT runtime is picking INT8 GEMM kernels
          # (`MatMulIntegerToFloat` / `QLinearMatMul`) or falling back
          # to dequantize-then-FP32 on runners without AVX-VNNI. See
          # `src/canary/profiling.rs` and issue #58 PR #64 for the
          # investigation context.
          CANARY_PROFILE_DIR: ${{ github.workspace }}/canary-profile
        run: |
          ./target/release/examples/eval_l1_smoke \
            --whisper-cli vendor/whisper.cpp/build/bin/whisper-cli \
            --model-en vendor/whisper.cpp/models/ggml-tiny.en.bin \
            --model-multi vendor/whisper.cpp/models/ggml-tiny.bin \
            --data-dir data/fleurs_subset \
            --canary-en-dir vendor/canary_en \
            --parakeet-ja-dir vendor/parakeet_ja \
            --paraformer-zh-dir vendor/paraformer_zh \
            --canary-es-dir vendor/canary_es \
            --whisper-onnx-ko-dir vendor/whisper_onnx_turbo \
            --langs en,ja,zh,es,ko \
            --baseline docs/benchmarks/ci_baseline.json \
            --dump-utterances

      - name: List captured Canary profile traces
        if: always()
        run: ls -la "${{ github.workspace }}/canary-profile" || true

      - name: Upload Canary ORT profile traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canary-ort-profile-${{ github.run_id }}
          path: ${{ github.workspace }}/canary-profile/*.json
          if-no-files-found: warn
          retention-days: 7

  # L1 fast layer ablation + per-layer μ-benchmark (§1.1 / §3.8 Phase A-2).
  # Replays committed text fixtures through MockAsr → post-ASR layers,
  # measures ΔWER per layer config and per-layer p50/p95 latency.
  # No whisper, no audio, no network — completes in seconds.
  evaluate-fast:
    name: evaluate (layer ablation + μ-benchmark)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: eval-fast

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libasound2-dev pkg-config

      - name: Build eval binary
        run: cargo build --release --example eval_l1_fast --locked

      - name: Run L1 fast evaluation
        run: |
          ./target/release/examples/eval_l1_fast \
            --fixtures-dir tests/evaluation/fixtures \
            --baseline docs/benchmarks/ci_baseline_layers.json
