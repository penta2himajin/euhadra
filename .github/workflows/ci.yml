name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # Default-features build, integration + unit + doc tests, and clippy.
  test:
    name: test (default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libasound2-dev pkg-config

      - name: Build
        run: cargo build --all-targets --locked

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --all-targets --locked

      - name: Doc tests
        run: cargo test --doc --locked

  # Verify the optional `onnx` feature still type-checks and lints clean.
  # We don't run the ONNX test path because the bundled models aren't
  # available in CI; `check + clippy` catches regressions in the surface
  # without requiring model artifacts.
  onnx-check:
    name: check (onnx feature)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: onnx

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libasound2-dev pkg-config

      - name: Check (onnx)
        run: cargo check --features onnx --all-targets --locked

      - name: Clippy (onnx)
        run: cargo clippy --features onnx --all-targets --locked -- -D warnings

  # L1 ASR live smoke (§1.1 / §3.8): runs Parakeet (en + ja),
  # Paraformer-large (zh), Canary-180M-Flash (es), SenseVoice-Small
  # (ko), and whisper-tiny (fallback) on a 10-utterance FLEURS subset
  # per language, measures WER/CER + ASR/E2E latency + RTF, and gates
  # against docs/benchmarks/ci_baseline.json. All large artefacts
  # (whisper.cpp build, GGML models, FLEURS subset, parakeet en + ja
  # ONNX bundles, paraformer-zh ONNX bundle, canary-es ONNX bundle,
  # sensevoice ONNX bundle) are cached so warm runs finish in a couple
  # of minutes.
  # Parakeet-ja replaced whisper-tiny for `ja` in PR #11 (CER 42% → 3.3%).
  # Parakeet-v3 replaced whisper-tiny.en for `en` in PR #12 (WER 8.4% → 7.5%).
  # Paraformer-large replaced whisper-tiny for `zh` in PR #14
  # (CER 37% → ~5%; baseline numbers recalibrated in a follow-up commit).
  # SenseVoice-Small added `ko` in PR #45 — first run after merge has
  # no baseline entry and emits a warn (not fail); the baseline is
  # back-filled with the measured numbers in a follow-up commit.
  evaluate-asr:
    name: evaluate (ASR live smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: eval

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev pkg-config build-essential cmake python3-pip

      - name: Install Python deps for FLEURS download
        run: pip3 install --quiet 'datasets==2.21.0' soundfile librosa

      - name: Cache whisper.cpp build + tiny models
        id: whisper-cache
        uses: actions/cache@v4
        with:
          path: vendor/whisper.cpp
          key: whisper-cpp-v1.7.4-tiny-${{ runner.os }}

      - name: Build whisper.cpp + download tiny models
        run: bash scripts/setup_whisper.sh

      - name: Cache FLEURS subset
        id: fleurs-cache
        uses: actions/cache@v4
        with:
          path: data/fleurs_subset
          key: fleurs-subset-v3-en-ja-zh-es-ko-n10

      - name: Download FLEURS subset (cache miss only)
        if: steps.fleurs-cache.outputs.cache-hit != 'true'
        run: python3 scripts/download_fleurs_subset.py --lang en --lang ja --lang zh --lang es --lang ko --n 10

      - name: Cache parakeet-ja ONNX bundle (~2.4 GB)
        id: parakeet-ja-cache
        uses: actions/cache@v4
        with:
          path: vendor/parakeet_ja
          key: parakeet-tdt-ctc-0.6b-ja-sunilmahendrakar-v1

      - name: Download parakeet-ja model (cache miss only)
        if: steps.parakeet-ja-cache.outputs.cache-hit != 'true'
        run: bash scripts/setup_parakeet_ja.sh
        env:
          PARAKEET_JA_DIR: vendor/parakeet_ja

      - name: Cache parakeet-en ONNX bundle (~2.4 GB)
        id: parakeet-en-cache
        uses: actions/cache@v4
        with:
          path: vendor/parakeet_en
          key: parakeet-tdt-0.6b-v3-istupakov-v1

      - name: Download parakeet-en model (cache miss only)
        if: steps.parakeet-en-cache.outputs.cache-hit != 'true'
        run: bash scripts/setup_parakeet_en.sh
        env:
          PARAKEET_EN_DIR: vendor/parakeet_en

      - name: Cache paraformer-zh ONNX bundle (~240 MB)
        id: paraformer-zh-cache
        uses: actions/cache@v4
        with:
          path: vendor/paraformer_zh
          key: paraformer-large-zh-funasr-quant-v1

      - name: Download paraformer-zh model (cache miss only)
        if: steps.paraformer-zh-cache.outputs.cache-hit != 'true'
        run: bash scripts/setup_paraformer_zh.sh
        env:
          PARAFORMER_ZH_DIR: vendor/paraformer_zh

      - name: Cache canary-es ONNX bundle (~779 MB FP32)
        id: canary-es-cache
        uses: actions/cache@v4
        with:
          path: vendor/canary_es
          key: canary-180m-flash-istupakov-fp32-v1

      - name: Download canary-es model (cache miss only)
        if: steps.canary-es-cache.outputs.cache-hit != 'true'
        run: bash scripts/setup_canary.sh
        env:
          CANARY_DIR: vendor/canary_es
          CANARY_FP32: "1"

      # canary-en uses the SAME `canary-180m-flash` multilingual
      # checkpoint as canary-es — only the weight variant differs
      # (INT8 vs FP32) and the per-language adapter config. We keep
      # the bundles in separate vendor dirs / cache slots so that
      # FP32 ↔ INT8 sweeps for the Phase 2 measurement (issue #57)
      # don't clobber each other, and so the FP32 cache key can stay
      # pinned at `…-fp32-v1` across the swap.
      - name: Cache canary-en ONNX bundle (~213 MB INT8)
        id: canary-en-cache
        uses: actions/cache@v4
        with:
          path: vendor/canary_en
          key: canary-180m-flash-istupakov-int8-v1

      - name: Download canary-en model (cache miss only)
        if: steps.canary-en-cache.outputs.cache-hit != 'true'
        run: bash scripts/setup_canary.sh
        env:
          CANARY_DIR: vendor/canary_en

      # SenseVoice-Small ONNX bundle (~1.1 GB total: ~895 MB FP32 +
      # ~234 MB INT8 + sidecars). Self-exported from the official
      # `iic/SenseVoiceSmall` HuggingFace repo via FunASR — no
      # third-party pre-export. The cache key is bumped whenever the
      # bundle layout changes; warm runs skip the heavy Python deps
      # entirely.
      - name: Cache sensevoice ONNX bundle (~1.1 GB)
        id: sensevoice-cache
        uses: actions/cache@v4
        with:
          path: vendor/sensevoice
          key: sensevoice-small-funaudiollm-fp32-int8-v1

      - name: Install Python deps for SenseVoice export (cache miss only)
        if: steps.sensevoice-cache.outputs.cache-hit != 'true'
        run: |
          # FunASR's runtime imports torchaudio at module scope, so it
          # must be installed alongside torch (CPU wheels). libsndfile1
          # backs torchaudio's audio I/O and isn't always preinstalled
          # on minimal images. `onnxscript` is required by torch >= 2.5's
          # ONNX exporter at runtime.
          #
          # torch is pinned to <2.5 (CPU wheels) because the 2.5+ ONNX
          # exporter emits a `Less` op with mismatched int64/float
          # operands inside the SenseVoice graph — onnxruntime then
          # refuses to load with `Type Error: Type parameter (T) of
          # Optype (Less) bound to different types`. The 2.4.x series
          # exporter handles the same model cleanly. Once upstream
          # funasr / sensevoice fix the export graph, the pin can be
          # dropped.
          #
          # Drop --quiet so any resolver / build error surfaces in CI
          # logs.
          sudo apt-get install -y --no-install-recommends libsndfile1
          python3 -m pip install --upgrade pip
          python3 -m pip install \
            --extra-index-url https://download.pytorch.org/whl/cpu \
            'torch<2.5' 'torchaudio<2.5'
          python3 -m pip install \
            funasr modelscope onnx onnxruntime onnxscript sentencepiece

      - name: Verify Python deps importable (cache miss only)
        if: steps.sensevoice-cache.outputs.cache-hit != 'true'
        run: |
          python3 - <<'PY'
          import sys
          mods = ["torch", "torchaudio", "onnx", "onnxruntime",
                  "sentencepiece", "modelscope", "funasr"]
          failed = []
          for m in mods:
              try:
                  mod = __import__(m)
                  print(f"[ok] import {m} (version: {getattr(mod, '__version__', 'unknown')})")
              except Exception as e:  # noqa: BLE001
                  print(f"[FAIL] import {m}: {type(e).__name__}: {e}", file=sys.stderr)
                  failed.append(m)
          if failed:
              print(f"\n[error] {len(failed)} module(s) failed to import: {failed}",
                    file=sys.stderr)
              sys.exit(1)
          PY

      - name: Self-export SenseVoice ONNX (cache miss only)
        if: steps.sensevoice-cache.outputs.cache-hit != 'true'
        run: bash scripts/setup_sensevoice.sh
        env:
          SENSEVOICE_DIR: vendor/sensevoice

      - name: Build eval binary (with onnx for Parakeet/Paraformer/Canary/SenseVoice adapters)
        run: cargo build --release --example eval_l1_smoke --features onnx --locked

      - name: Run L1 smoke evaluation
        run: |
          ./target/release/examples/eval_l1_smoke \
            --whisper-cli vendor/whisper.cpp/build/bin/whisper-cli \
            --model-en vendor/whisper.cpp/models/ggml-tiny.en.bin \
            --model-multi vendor/whisper.cpp/models/ggml-tiny.bin \
            --data-dir data/fleurs_subset \
            --canary-en-dir vendor/canary_en \
            --parakeet-ja-dir vendor/parakeet_ja \
            --paraformer-zh-dir vendor/paraformer_zh \
            --canary-es-dir vendor/canary_es \
            --sensevoice-dir vendor/sensevoice \
            --langs en,ja,zh,es,ko \
            --baseline docs/benchmarks/ci_baseline.json \
            --dump-utterances

  # L1 fast layer ablation + per-layer μ-benchmark (§1.1 / §3.8 Phase A-2).
  # Replays committed text fixtures through MockAsr → post-ASR layers,
  # measures ΔWER per layer config and per-layer p50/p95 latency.
  # No whisper, no audio, no network — completes in seconds.
  evaluate-fast:
    name: evaluate (layer ablation + μ-benchmark)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: eval-fast

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libasound2-dev pkg-config

      - name: Build eval binary
        run: cargo build --release --example eval_l1_fast --locked

      - name: Run L1 fast evaluation
        run: |
          ./target/release/examples/eval_l1_fast \
            --fixtures-dir tests/evaluation/fixtures \
            --baseline docs/benchmarks/ci_baseline_layers.json
